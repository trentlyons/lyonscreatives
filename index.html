<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Homepage</title>
</head>
<body>

<div class="form-group">
  <label>Service</label>

  <div class="custom-select" id="serviceSelect">
    <div class="custom-select__trigger">
      <span class="custom-select__placeholder">Select the closest fit</span>
      <div class="arrow"></div>
    </div>

    <div class="custom-options">
      <span class="custom-option" data-value="content">Content Creation</span>
      <span class="custom-option" data-value="ecommerce">eCommerce Growth</span>
      <span class="custom-option" data-value="both">Both / not sure yet</span>
    </div>
  </div>

  <input type="hidden" name="service" id="serviceInput">
</div>

<script src="script.js"></script>
</body>
</html>
